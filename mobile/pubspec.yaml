name: leevin_app
description: Leevin APP - Client Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP & API
  dio: ^5.4.0
  # State management
  provider: ^6.1.1
  # Local storage
  shared_preferences: ^2.2.2
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # Social login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  # File handling
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  # PDF viewing
  flutter_pdfview: ^1.3.2
  # Signatures
  signature: ^5.4.1
  # Notifications (uncomment when Firebase is configured)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.10
  # Navigation
  go_router: ^13.0.0
  # Animations
  flutter_animate: ^4.3.0
  # Internationalization
  intl: ^0.19.0
  # Pull to refresh
  pull_to_refresh: ^2.0.0
  # URL launcher
  url_launcher: ^6.2.2
  # Badges
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1B4D3E"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
